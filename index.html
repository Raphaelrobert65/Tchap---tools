<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tchap - Tools</title>

<style>
:root {
  --navy:#0B1F3A;
  --bg:#f5f7fb;
  --card:#ffffff;
  --border:#dbe4ee;
  --text:#0B1F3A;
  --muted:#6b7c93;
  --success:#17663a;
  --success-bg:#eef6ff;
  --error:#b42318;
  --error-bg:#fff2f2;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  padding:40px 24px;
}

.page{
  max-width:1200px;
  margin:auto;
}

.hero{
  background:var(--navy);
  color:white;
  padding:28px;
  border-radius:20px;
  margin-bottom:24px;
}

.hero h1{
  margin:0 0 6px;
}

.hero p{
  margin:0;
  opacity:0.85;
}

.tools-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  display:flex;
  flex-direction:column;
}

/* 🔥 FIX LAYOUT STABLE */
.card-body{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.result-zone{
  margin-top:12px;
  min-height:120px; /* stabilité visuelle */
}

h2{
  margin:0;
  font-size:20px;
}

p{
  margin:0;
  font-size:14px;
  color:var(--muted);
}

label{
  font-size:13px;
  font-weight:600;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
}

.actions{
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.btn-primary{
  background:var(--navy);
  color:white;
}

.btn-secondary{
  background:#eef3f8;
}

.result{
  background:var(--success-bg);
  padding:12px;
  border-radius:10px;
  font-size:13px;
}

.error{
  background:var(--error-bg);
  color:var(--error);
  padding:12px;
  border-radius:10px;
  font-size:13px;
}

@media(max-width:900px){
  .tools-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="page">

<div class="hero">
  <h1>Tchap - Tools</h1>
  <p>Identifier une instance, générer un MXID et vérifier l’ouverture d’un domaine.</p>
</div>

<div class="tools-grid">

<!-- 1 -->
<div class="card">
  <h2>Instance</h2>
  <p>Renseigner un domaine</p>

  <div class="card-body">
    <label>Domaine</label>
    <input id="domainInput" placeholder="beta.gouv.fr">

    <div class="actions">
      <button class="btn-primary" onclick="searchDomain()">Tester</button>
      <button class="btn-secondary" onclick="reset('domain')">Reset</button>
    </div>

    <div id="domainOutput" class="result-zone"></div>
  </div>
</div>

<!-- 2 -->
<div class="card">
  <h2>MXID</h2>
  <p>Renseigner un email</p>

  <div class="card-body">
    <label>Email</label>
    <input id="emailInput" placeholder="nom@beta.gouv.fr">

    <div class="actions">
      <button class="btn-primary" onclick="generateMxid()">Générer</button>
      <button class="btn-secondary" onclick="reset('email')">Reset</button>
    </div>

    <div id="emailOutput" class="result-zone"></div>
  </div>
</div>

<!-- 3 -->
<div class="card">
  <h2>Ouverture</h2>
  <p>Renseigner un domaine</p>

  <div class="card-body">
    <label>Domaine</label>
    <input id="statusInput" placeholder="beta.gouv.fr">

    <div class="actions">
      <button class="btn-primary" onclick="checkStatus()">Vérifier</button>
      <button class="btn-secondary" onclick="reset('status')">Reset</button>
    </div>

    <div id="statusOutput" class="result-zone"></div>
  </div>
</div>

</div>
</div>

<script>
const API="https://matrix.agent.dinum.tchap.gouv.fr/_matrix/identity/api/v1/info";

async function fetchInstance(domain){
  const res = await fetch(API+"?medium=&address=test@"+domain);
  const data = await res.json();
  return data.hs;
}

/* FEATURE 1 */
async function searchDomain(){
  const domain=document.getElementById("domainInput").value.trim();
  const out=document.getElementById("domainOutput");

  if(!domain) return out.innerHTML='<div class="error">Domaine invalide</div>';

  try{
    const instance=await fetchInstance(domain);
    out.innerHTML=`<div class="result">${instance}</div>`;
  }catch{
    out.innerHTML='<div class="error">Erreur</div>';
  }
}

/* FEATURE 2 */
async function generateMxid(){
  const email=document.getElementById("emailInput").value.trim();
  const out=document.getElementById("emailOutput");

  if(!email.includes("@")) return out.innerHTML='<div class="error">Email invalide</div>';

  const domain=email.split("@")[1];

  try{
    const instance=await fetchInstance(domain);
    const mxid="@"+email.replace("@","-")+":"+instance;
    out.innerHTML=`<div class="result">${mxid}</div>`;
  }catch{
    out.innerHTML='<div class="error">Erreur</div>';
  }
}

/* FEATURE 3 (refonte totale) */
async function checkStatus(){
  const domain=document.getElementById("statusInput").value.trim();
  const out=document.getElementById("statusOutput");

  if(!domain) return out.innerHTML='<div class="error">Domaine invalide</div>';

  try{
    const instance=await fetchInstance(domain);
    const status=instance.includes("externe") ? "Non ouvert" : "Ouvert";

    out.innerHTML=`
      <div class="result">
        ${status}<br><br>
        ${instance}
      </div>
    `;
  }catch{
    out.innerHTML='<div class="error">Erreur</div>';
  }
}

/* RESET */
function reset(type){
  if(type==="domain"){
    domainInput.value="";
    domainOutput.innerHTML="";
  }
  if(type==="email"){
    emailInput.value="";
    emailOutput.innerHTML="";
  }
  if(type==="status"){
    statusInput.value="";
    statusOutput.innerHTML="";
  }
}
</script>

</body>
</html>
