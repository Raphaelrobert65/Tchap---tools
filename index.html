<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tchap YAML Builder</title>

  <style>
    :root {
      --tchap-blue: #11296d;
      --tchap-blue-2: #173a92;
      --bg: #f4f7fb;
      --surface-soft: #f8fafc;
      --text: #101828;
      --muted: #667085;
      --border: #dfe5ef;
      --border-soft: #edf1f7;
      --success: #12b76a;
      --danger: #d92d20;
      --danger-bg: #fff1f3;
      --warning-bg: #fff7e6;
      --warning-text: #b54708;
      --neutral-bg: #f2f4f7;
      --neutral-text: #475467;
      --code-bg: #071527;
      --shadow: 0 18px 45px rgba(17, 41, 109, 0.08);
      --radius-lg: 22px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(76, 201, 240, 0.18), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    .app {
      min-height: 100vh;
      padding: 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--tchap-blue), var(--tchap-blue-2));
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: 0 14px 30px rgba(17, 41, 109, 0.24);
    }

    .brand-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .brand-subtitle {
      margin: 3px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .hero {
      background: linear-gradient(135deg, var(--tchap-blue), #193f9c);
      border-radius: 30px;
      padding: 22px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .domain-checker {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 999px;
      padding: 7px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.12);
      max-width: 100%;
    }

    .domain-checker input {
      width: 210px;
      min-width: 140px;
      border: 0;
      background: transparent;
      padding: 9px 12px;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }

    .domain-checker input::placeholder {
      color: #98a2b3;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .primary-button {
      background: white;
      color: var(--tchap-blue);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.18);
    }

    .check-button {
      background: var(--tchap-blue);
      color: white;
      padding: 9px 14px;
      font-size: 13px;
      box-shadow: none;
    }

    .secondary-button {
      background: #eef6ff;
      color: var(--tchap-blue);
    }

    .danger-button {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 104px;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status-idle,
    .status-loading {
      background: var(--neutral-bg);
      color: var(--neutral-text);
    }

    .status-open {
      background: #ecfdf3;
      color: #027a48;
    }

    .status-closed {
      background: var(--warning-bg);
      color: var(--warning-text);
    }

    .status-invalid,
    .status-error {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(420px, 0.85fr);
      gap: 24px;
      align-items: start;
    }

    .dossiers {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card,
    .yaml-panel {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .card {
      padding: 24px;
    }

    .card-header,
    .yaml-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .card-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--tchap-blue);
      text-transform: uppercase;
      margin: 0 0 6px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field span {
      font-size: 13px;
      font-weight: 800;
      color: #344054;
    }

    .field input,
    .field select {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      font-size: 14px;
      background: var(--surface-soft);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--tchap-blue);
      background: white;
      box-shadow: 0 0 0 4px rgba(17, 41, 109, 0.1);
    }

    .yaml-panel {
      position: sticky;
      top: 24px;
      overflow: hidden;
    }

    .yaml-header {
      padding: 22px 22px 0;
    }

    .yaml-toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .yaml-order-note {
      margin: -8px 22px 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .auto-sync-pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: #ecfdf3;
      color: #027a48;
      font-size: 12px;
      font-weight: 800;
    }

    pre {
      margin: 0;
      padding: 22px;
      background: var(--code-bg);
      color: #d8e7ff;
      min-height: 540px;
      overflow: auto;
      font-size: 14px;
      line-height: 1.55;
    }

    code {
      white-space: pre;
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .yaml-panel {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 20px;
      }

      .hero {
        flex-direction: column;
        align-items: stretch;
      }

      .domain-checker {
        width: 100%;
        border-radius: 22px;
        flex-wrap: wrap;
      }

      .domain-checker input {
        flex: 1;
        width: auto;
      }

      .status-badge {
        flex: 1;
      }

      .primary-button {
        width: 100%;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">T</div>
        <div>
          <p class="brand-title">Tchap YAML Builder</p>
          <p class="brand-subtitle">Générateur YAML</p>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="domain-checker">
        <input
          id="domainInput"
          type="text"
          placeholder="Tester un domaine"
          autocomplete="off"
        />
        <button class="check-button" id="checkDomainBtn">Vérifier</button>
        <span class="status-badge status-idle" id="domainStatusBadge">À vérifier</span>
      </div>

      <button class="primary-button" id="addDossierBtn">
        + Ajouter un dossier
      </button>
    </section>

    <section class="layout">
      <div class="dossiers" id="dossiersContainer"></div>

      <aside class="yaml-panel">
        <div class="yaml-header">
          <div>
            <p class="card-label">Aperçu temps réel</p>
            <h2>YAML</h2>
          </div>

          <div class="yaml-toolbar">
            <span class="auto-sync-pill">Auto-sync</span>
            <button class="secondary-button" id="copyYamlBtn">Copier</button>
          </div>
        </div>

        <p class="yaml-order-note">Ordre YAML : du plus ancien au plus récent</p>

        <pre><code id="yamlOutput"></code></pre>
      </aside>
    </section>
  </main>

  <script>
    const INSTANCES = [
      "agent",
      "agriculture",
      "collectivites",
      "culture",
      "dev-durable",
      "dinum",
      "diplomatie",
      "education",
      "elysee",
      "finances",
      "interieur",
      "intradef",
      "justice",
      "pm"
    ];

    const dossiersContainer = document.getElementById("dossiersContainer");
    const yamlOutput = document.getElementById("yamlOutput");
    const addBtn = document.getElementById("addDossierBtn");
    const copyBtn = document.getElementById("copyYamlBtn");

    const domainInput = document.getElementById("domainInput");
    const checkDomainBtn = document.getElementById("checkDomainBtn");
    const domainStatusBadge = document.getElementById("domainStatusBadge");

    let nextId = 1;
    let dossiers = [createDossier()];
    let domainStatus = "idle";

    function createDossier() {
      return {
        id: nextId++,
        mail: "",
        siret: "",
        denomination: "",
        formeJuridique: "",
        nomDomaine: "",
        instance: "agent"
      };
    }

    function cleanDomain(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/^https?:\/\//, "")
        .replace(/\/$/, "");
    }

    function isValidDomain(domain) {
      return /^(?!-)([a-z0-9-]{1,63}\.)+[a-z]{2,}$/.test(domain);
    }

    function setDomainStatus(status) {
      domainStatus = status;

      const labels = {
        idle: "À vérifier",
        loading: "Vérification",
        open: "Déjà ouvert",
        closed: "Pas encore ouvert",
        invalid: "Domaine invalide",
        error: "Erreur vérification"
      };

      domainStatusBadge.textContent = labels[status];
      domainStatusBadge.className = `status-badge status-${status}`;

      checkDomainBtn.disabled = status === "loading";
      checkDomainBtn.textContent = status === "loading" ? "Vérification..." : "Vérifier";
    }

    async function checkDomainStatus() {
      const domain = cleanDomain(domainInput.value);
      domainInput.value = domain;

      if (!isValidDomain(domain)) {
        setDomainStatus("invalid");
        return;
      }

      setDomainStatus("loading");

      try {
        const email = `test@${domain}`;
        const url = `https://matrix.agent.dinum.tchap.gouv.fr/_matrix/identity/api/v1/info?medium=&address=${encodeURIComponent(email)}`;
        const response = await fetch(url);

        if (!response.ok) {
          setDomainStatus("error");
          return;
        }

        const data = await response.json();

        if (!data.hs) {
          setDomainStatus("error");
          return;
        }

        if (String(data.hs).includes("externe")) {
          setDomainStatus("closed");
        } else {
          setDomainStatus("open");
        }
      } catch (error) {
        setDomainStatus("error");
      }
    }

    function escapeYaml(value) {
      return String(value || "")
        .replace(/\\/g, "\\\\")
        .replace(/"/g, '\\"');
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function buildYaml() {
      return dossiers.map(d => {
        const statut = escapeYaml(d.formeJuridique);

        return `- Domaine: "${escapeYaml(d.nomDomaine)}"
  Instance: "${escapeYaml(d.instance)}"
  SIRET: "${escapeYaml(d.siret)}"
  Rattachement: "${statut}"
  Statut_juridique: "${statut}"
  Organisation: "${escapeYaml(d.denomination)}"
  Interlocuteur: "${escapeYaml(d.mail)}"`;
      }).join("\n");
    }

    function render() {
      dossiersContainer.innerHTML = "";

      [...dossiers].reverse().forEach(d => {
        const idx = dossiers.findIndex(x => x.id === d.id);

        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
          <div class="card-header">
            <div>
              <p class="card-label">Dossier #${idx + 1}</p>
              <h2>Données</h2>
            </div>

            <button class="danger-button" data-id="${d.id}" ${dossiers.length === 1 ? "disabled" : ""}>
              Supprimer
            </button>
          </div>

          <div class="form-grid">
            <label class="field">
              <span>Mail professionnel</span>
              <input type="email" placeholder="prenom.nom@organisation.fr" data-id="${d.id}" data-field="mail" value="${escapeHtml(d.mail)}">
            </label>

            <label class="field">
              <span>SIRET</span>
              <input type="text" placeholder="12345678900010" data-id="${d.id}" data-field="siret" value="${escapeHtml(d.siret)}">
            </label>

            <label class="field">
              <span>Dénomination organisation</span>
              <input type="text" placeholder="Nom officiel de l’organisation" data-id="${d.id}" data-field="denomination" value="${escapeHtml(d.denomination)}">
            </label>

            <label class="field">
              <span>Forme juridique</span>
              <input type="text" placeholder="Commune, ministère, établissement public..." data-id="${d.id}" data-field="formeJuridique" value="${escapeHtml(d.formeJuridique)}">
            </label>

            <label class="field">
              <span>Nom de domaine</span>
              <input type="text" placeholder="organisation.fr" data-id="${d.id}" data-field="nomDomaine" value="${escapeHtml(d.nomDomaine)}">
            </label>

            <label class="field">
              <span>Domaine à ouvrir</span>
              <select data-id="${d.id}" data-field="instance">
                ${INSTANCES.map(instance =>
                  `<option value="${instance}" ${instance === d.instance ? "selected" : ""}>${instance}</option>`
                ).join("")}
              </select>
            </label>
          </div>
        `;

        dossiersContainer.appendChild(card);
      });

      yamlOutput.textContent = buildYaml();
    }

    dossiersContainer.addEventListener("input", e => {
      const id = e.target.dataset.id;
      const field = e.target.dataset.field;

      if (id && field) {
        const dossier = dossiers.find(d => d.id == id);
        if (dossier) {
          dossier[field] = e.target.value;
          yamlOutput.textContent = buildYaml();
        }
      }
    });

    dossiersContainer.addEventListener("change", e => {
      const id = e.target.dataset.id;
      const field = e.target.dataset.field;

      if (id && field) {
        const dossier = dossiers.find(d => d.id == id);
        if (dossier) {
          dossier[field] = e.target.value;
          yamlOutput.textContent = buildYaml();
        }
      }
    });

    dossiersContainer.addEventListener("click", e => {
      if (e.target.classList.contains("danger-button")) {
        const id = e.target.dataset.id;
        dossiers = dossiers.filter(d => d.id != id);
        render();
      }
    });

    addBtn.addEventListener("click", () => {
      dossiers.push(createDossier());
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    copyBtn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(buildYaml());
      copyBtn.textContent = "Copié";
      setTimeout(() => copyBtn.textContent = "Copier", 1000);
    });

    checkDomainBtn.addEventListener("click", checkDomainStatus);

    domainInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        checkDomainStatus();
      }
    });

    domainInput.addEventListener("input", () => {
      if (domainStatus !== "idle") {
        setDomainStatus("idle");
      }
    });

    render();
  </script>
</body>
</html>
